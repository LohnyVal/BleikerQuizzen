<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <script src="../js/quiz.js" defer></script>
    <script src="../js/grafisk.js" defer></script>
</head>
<body>
    <nav>
        <ul>
            <div class="leftNavDiv">
                <li><a href="../index.html"><img src="../img/svart.png" alt="" id="logo" draggable="false"></a></li>
            </div>
            <div class="centerNavDiv">
                <li><a href="./grafiskDesign.html" class="linkToHtml">
                    Grafisk
                </a></li>
                <li><a href="./quiz.html" class="linkToHtml">
                    Quiz
                </a></li>
                <li><a href="./video.html" class="linkToHtml">
                    Video
                </a></li>
                <li><a href="./soMe.html" class="linkToHtml">
                    SoMe
                </a></li>
            </div>
        </ul>
    </nav>
    <section class="heroQuiz">
        <div id="wrapper">

            
            <div id="startQuiz">
                <h2>QUIZZEN</h2>
                <div id="infoQuizDiv">
                    <p id="infoQuiz">I denne quizzen vil du blitt stilt spørsmål som kan være relevant til hva du lærer i de forskjellige utdanningsprogrammene på videregående skole</p>
                </div>
                <div id="typeInNameQuizDiv">
                    <label for="navn">Skriv inn ditt navn her</label>
                    <input type="text" id="navn" class="navn" name="navn" placeholder="Navn:"> 
                </div>
                <button onclick="startQuiz()">Start Quiz</button>
            </div>

            <div id="quizContainer">
                <p id="showCurrentQuestion"></p>
                <h2 id="h2">Spørsmål</h2>
                <div id="video"></div>
                <div id="buttons" class="buttons">
                </div>
                <p id="feedback"></p>
                <div id="next"></div>
            </div>


            <div id="summaryContainer">
                <h2>Ditt sammendrag</h2>
                <p id="points"></p>
                <h2>Top: 5</h2>
                <ul id="highscore"></ul>
            </div>
        </div>
    </section>



    <footer class="footer">
        <img src="../img/svart.png" alt="" id="footerLogo" draggable="false">
        <p class="footerText">Laget av: Andreas 1IMB</p>
        <p class="footerText"><a href="mailto: bleikerQuizzen@gmail.com">Kontakt: bleikerQuizzen@gmail.com</a></p>
    </footer>
</body>
</html>
